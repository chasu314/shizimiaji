<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アイスキャッチDX</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#ffe4ec, #e0f7ff);
    font-family: sans-serif;
}

canvas {
    display: block;
    margin: auto;
    background: #ffffffcc;
    border-radius: 20px;
}

#start {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #00000088;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}
button {
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    background: #ff8acb;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="start">
    <h1>🍦 アイスキャッチDX 🍦</h1>
    <button onclick="startGame()">スタート</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = 400;
canvas.height = 600;

let cone, iceList, score, miss, level;
let keys = {};
let highScore = localStorage.getItem("iceHighScore") || 0;

// 効果音
const catchSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");
const missSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_1b6c0c0f4f.mp3");

function init(){
    cone = {x:180,y:520,width:80,height:90,speed:14};
    iceList = [];
    score = 0;
    miss = 0;
    level = 1;
}

function startGame(){
    document.getElementById("start").style.display="none";
    init();
    spawnIce();
    loop();
}

function spawnIce(){
    iceList.push({
        x: Math.random()*360+20,
        y: -40,
        size: 50, // ←大きく！
        speed: 2 + Math.random()*2 + level*0.5,
        color: ["#ff9aa2","#ffdac1","#b5ead7","#c7ceea"][Math.floor(Math.random()*4)]
    });
    setTimeout(spawnIce, 900 - level*50);
}

function drawCone(){
    ctx.fillStyle="#d29b5a";
    ctx.beginPath();
    ctx.moveTo(cone.x,cone.y);
    ctx.lineTo(cone.x+cone.width/2,cone.y+cone.height);
    ctx.lineTo(cone.x+cone.width,cone.y);
    ctx.fill();
}

function drawIce(ic){
    ctx.fillStyle=ic.color;
    ctx.beginPath();
    ctx.arc(ic.x,ic.y,ic.size/2,0,Math.PI*2);
    ctx.fill();

    // 顔
    ctx.fillStyle="#000";
    ctx.beginPath(); ctx.arc(ic.x-8,ic.y-5,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ic.x+8,ic.y-5,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(ic.x,ic.y+5,6,0,Math.PI);
    ctx.stroke();
}

function update(){
    if(keys["ArrowLeft"] && cone.x>0) cone.x -= cone.speed;
    if(keys["ArrowRight"] && cone.x<canvas.width-cone.width) cone.x += cone.speed;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawCone();

    for(let i=0;i<iceList.length;i++){
        let ic = iceList[i];
        ic.y += ic.speed;
        drawIce(ic);

        if(ic.y > cone.y && ic.x > cone.x && ic.x < cone.x+cone.width){
            score++;
            catchSound.currentTime = 0;
            catchSound.play();

            iceList.splice(i,1);
            i--;

            level = Math.floor(score / 5) + 1;
        }
        else if(ic.y>canvas.height){
            miss++;
            missSound.currentTime = 0;
            missSound.play();

            iceList.splice(i,1);
            i--;
        }
    }

    ctx.fillStyle="#333";
    ctx.fillText("Score:"+score,10,20);
    ctx.fillText("Miss:"+miss,10,40);
    ctx.fillText("Level:"+level,10,60);
    ctx.fillText("High:"+highScore,10,80);

    if(miss>=5){
        if(score > highScore){
            localStorage.setItem("iceHighScore", score);
        }
        setTimeout(()=>{
            alert("ゲームオーバー！\nスコア："+score+"\n最高記録："+Math.max(score, highScore));
            location.reload();
        },100);
    }
}

function loop(){
    update();
    requestAnimationFrame(loop);
}

// キー
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// マウス
canvas.addEventListener("mousemove",e=>{
    const rect=canvas.getBoundingClientRect();
    cone.x = e.clientX - rect.left - cone.width/2;
});
</script>

</body>
</html>
